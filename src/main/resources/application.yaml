spring:
  application:
    name: Salms

  security:
    basicauth:
      enabled: true
      username: client
      password: client-password

    user:
      name: client
      password: client-password

  datasource:
    url: jdbc:postgresql://localhost:5432/salon_management
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  config:
    import: "optional:configserver:"

server:
  port: 8090

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE